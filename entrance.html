<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrance — TU Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #111214;
      --surface:  #18191d;
      --surface2: #1f2025;
      --surface3: #26272e;
      --border:   rgba(255,255,255,.07);
      --border2:  rgba(255,255,255,.12);
      --text:     #e8e9ec;
      --text2:    #9a9ca5;
      --text3:    #5a5c66;
      --red:      #e03e2a;
      --ease:     cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ── */
    .topbar {
      min-height: 54px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      padding-top: max(env(safe-area-inset-top), 0px);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 20;
    }

    .tb-back {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      transition: background .12s, color .12s, border-color .12s;
      white-space: nowrap; flex-shrink: 0;
    }
    .tb-back:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }

    .tb-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    .tb-crumb {
      display: flex; align-items: center; gap: 6px;
      flex: 1; min-width: 0;
    }
    .tb-crumb-tag {
      font-size: 10px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--red);
      background: rgba(224,62,42,.1);
      padding: 3px 7px; border-radius: 5px;
      white-space: nowrap; flex-shrink: 0;
    }
    .tb-crumb-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── SCENE VIEW ── */
    .scene {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
    }

    .scene-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      user-select: none; -webkit-user-drag: none;
    }

    /* Subtle bottom gradient for footer readability */
    .scene-grad {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 100%);
      pointer-events: none;
    }
    .scene-vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.5) 100%);
    }

    .loading {
      position: absolute; inset: 0; z-index: 5;
      display: grid; place-items: center;
      background: var(--bg);
      transition: opacity .3s, visibility .3s;
    }
    .loading.done { opacity: 0; pointer-events: none; visibility: hidden; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--surface3);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ARROWS ── */
    .arrow {
      position: absolute; z-index: 10;
      transform: translate(-50%, -50%);
      cursor: pointer; display: none;
      background: none; border: none; padding: 0;
      font-family: inherit;
    }
    .arrow.on { display: flex; flex-direction: column; align-items: center; gap: 6px; }

    .arrow-ring {
      width: clamp(44px, 6.5vw, 56px);
      height: clamp(44px, 6.5vw, 56px);
      border-radius: 50%;
      background: rgba(24,25,29,.7);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.18);
      display: grid; place-items: center;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
      transition: background .15s, border-color .15s, transform .15s var(--ease);
    }
    .arrow:hover .arrow-ring {
      background: rgba(224,62,42,.25);
      border-color: rgba(224,62,42,.5);
      transform: scale(1.08);
    }
    .arrow:active .arrow-ring { transform: scale(.93); }

    .arrow-tip {
      font-size: 9px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: rgba(255,255,255,.55);
      background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
      padding: 2px 7px; border-radius: 4px; white-space: nowrap;
      opacity: 0; transition: opacity .15s; pointer-events: none;
    }
    .arrow:hover .arrow-tip { opacity: 1; }

    .arrow.up    { left: 50%; top: 22%; }

    /* ── BOTTOM ACTION BAR ── */
    .actions {
      flex-shrink: 0;
      display: grid; grid-template-columns: 1fr 1.6fr;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .act-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
      white-space: nowrap;
    }
    .act-btn:hover {
      background: var(--surface3);
      border-color: var(--border2);
      color: var(--text);
    }

    .act-btn.primary {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      font-weight: 600;
    }
    .act-btn.primary:hover {
      opacity: .9;
      box-shadow: 0 6px 20px rgba(224,62,42,.3);
    }

    @media (max-width: 480px) {
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- TOPBAR -->
  <header class="topbar">
    <a class="tb-back" href="./index.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </a>
    <div class="tb-sep"></div>
    <div class="tb-crumb">
      <span class="tb-crumb-tag">Entrance</span>
      <span class="tb-crumb-name" id="bldName">—</span>
    </div>
  </header>

  <!-- SCENE -->
  <div class="scene">
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div id="errorState" style="display:none; position:absolute; inset:0; z-index:10; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:32px; background:var(--bg); text-align:center;">
      <div style="width:48px;height:48px;border-radius:50%;background:rgba(224,62,42,.12);display:grid;place-items:center;color:var(--red);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      </div>
      <div style="font-size:16px;font-weight:700;color:var(--text);">Gagal Memuat Data</div>
      <div id="errMsg" style="font-size:13px;color:var(--text2);max-width:280px;line-height:1.5;"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;">
        <button onclick="location.href='./index.html'" style="padding:9px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:var(--surface2);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">← Kembali ke Peta</button>
        <button onclick="location.reload()" style="padding:9px 18px;border-radius:8px;border:1px solid var(--red);background:var(--red);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">Coba Lagi</button>
      </div>
    </div>
    <img class="scene-img" id="sceneImg" alt="Entrance view"/>
    <div class="scene-vignette"></div>
    <div class="scene-grad"></div>

    <!-- Arrows -->
    <button class="arrow up" id="aUp" aria-label="Enter building">
      <div class="arrow-ring"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
      <div class="arrow-tip">Masuk</div>
    </button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="act-btn" id="btnDir" aria-label="Open in Google Maps">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Google Maps
    </button>
    <button class="act-btn primary" id="btnEnter" aria-label="Enter building">
      Masuk Gedung
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

    <script>
    const p = k => new URL(location.href).searchParams.get(k);

    function showError(msg) {
      document.getElementById("loading").classList.add("done");
      const el = document.getElementById("errorState");
      document.getElementById("errMsg").textContent = msg;
      el.style.display = "flex";
    }

    async function run() {
      const id = p("id");
      if (!id) { location.href = "./index.html"; return; }

      let data;
      try {
        const res = await fetch("./campus.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        console.error("Failed to load campus.json:", e);
        showError("Tidak dapat memuat campus.json. Periksa koneksi Anda, lalu coba lagi.");
        return;
      }

      const b = data.buildings.find(x => x.id === id);
      if (!b) {
        showError(`Gedung dengan ID "${id}" tidak ditemukan dalam data.`);
        return;
      }

      document.getElementById("bldName").textContent = b.name;

      const img     = document.getElementById("sceneImg");
      const loading = document.getElementById("loading");
      img.onload  = () => loading.classList.add("done");
      img.onerror = () => loading.classList.add("done");
      img.src = b.entrance.image;

      const encodedId = encodeURIComponent(b.id);

      // Up arrow → enter building
      const up = document.getElementById("aUp");
      up.classList.add("on");
      up.onclick = () => location.href = `./indoor.html?id=${encodedId}&floor=1`;

      document.getElementById("btnDir").onclick = () =>
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${b.entrance.lat},${b.entrance.lng}`, "_blank");

      document.getElementById("btnEnter").onclick = () =>
        location.href = `./indoor.html?id=${encodedId}&floor=1`;
    }

    run();
  </script>
</body>
</html>
