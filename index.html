<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TU Navigator — Telkom University</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="./styles/tokens.css"/>
  <link rel="stylesheet" href="./styles/components.css"/>
  <link rel="stylesheet" href="./styles/map.css"/>
</head>
<body>
  <div class="app">
    <main class="map-area" id="mapArea">
      <div id="map"></div>
    </main>

    <aside class="sidebar no-transition" id="sidebar">
      <div class="rail-brand">
        <div class="sb-brand-mark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/></svg>
        </div>
      </div>
      <div class="rail-list" id="railList"></div>

      <div class="sheet-handle" id="sheetHandle" style="display:none">
        <div class="sheet-handle-bar"></div>
        <div class="sheet-peek">
          <div class="sheet-peek-dot"></div>
          <div class="sheet-peek-title">
            <div>SIGEDUNG</div>
            <div style="font-size:11px; color: var(--text3); font-weight:400;">Campus Navigator</div>
          </div>
          <span class="sheet-peek-count" id="peekCount"></span>
          <svg class="sheet-chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
        </div>
      </div>

      <div class="sb-head">
        <div class="sb-brand">
          <div class="sb-brand-mark">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/></svg>
          </div>
          <span class="sb-brand-text">Telkom University</span>
        </div>
        <div class="sb-title-block">
          <div class="sb-title">SIGEDUNG</div>
          <div class="sb-sub">Campus Navigator</div>
        </div>
        <div class="sb-search">
          <svg class="sb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="searchQ" placeholder="Cari gedung…" autocomplete="off"/>
        </div>
      </div>

      <div class="sb-divider"></div>
      <div class="sb-section-label" id="sectionLabel">Semua Gedung</div>
      <div class="sb-list" id="bldList"></div>
    </aside>

    <button class="collapse-btn" id="collapseBtn" title="Collapse sidebar">
      <svg class="collapse-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <script type="module" src="./scripts/map.js"></script>
</body>
</html>
